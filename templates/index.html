<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Striped Owl Security | Intel Unit</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-blue: #547fb3;
            --neon-red: #ff4d4d;
            --terminal-green: #00ff41;
            --bg-dark: #0b1e33;
        }

        * { box-sizing: border-box; }
        
        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            margin: 0;
            background-image: radial-gradient(circle at top, #162a44 0%, #0b1e33 80%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            overflow-x: hidden;
        }

        /* Cabeçalho */
        .header { text-align: center; margin-bottom: 30px; }
        .header-logo { width: 90px; filter: drop-shadow(0 0 10px var(--neon-blue)); }
        h1 { 
            font-family: 'Share Tech Mono', monospace; 
            letter-spacing: 8px; font-size: 28px; text-transform: uppercase; 
            text-shadow: 0 0 15px var(--neon-blue); margin-top: 15px;
        }

        /* Container Principal */
        .container { 
            width: 95%; max-width: 600px; background: rgba(16, 38, 64, 0.9); 
            padding: 30px; border-radius: 4px; border: 1px solid rgba(84, 127, 179, 0.3);
            box-shadow: 0 0 30px rgba(0,0,0,0.8); position: relative; margin-bottom: 40px;
        }

        .terminal-box {
            background: #000; border: 1px solid #1a3a5a; padding: 10px;
            font-family: 'Share Tech Mono', monospace; font-size: 11px;
            color: var(--terminal-green); margin-bottom: 20px; border-radius: 4px;
        }

        .input-group { display: flex; gap: 10px; margin-bottom: 25px; }
        input[type="text"] { 
            flex: 1; padding: 15px; border-radius: 4px; border: 1px solid #2c3e50; 
            background: rgba(0, 0, 0, 0.5); color: var(--terminal-green); font-family: 'Share Tech Mono';
        }

        .btn-verificar { 
            padding: 0 30px; background: var(--neon-blue); color: white; 
            border: none; cursor: pointer; font-weight: bold; text-transform: uppercase;
        }

        .btn-secondary { 
            display: flex; align-items: center; justify-content: center; gap: 10px; 
            width: 100%; padding: 15px; text-decoration: none; font-weight: bold; font-size: 13px; 
            margin-bottom: 12px; text-transform: uppercase; border-radius: 4px;
        }
        .btn-leak { color: var(--neon-red); border: 1px solid rgba(255, 77, 77, 0.3); background: rgba(255, 77, 77, 0.05); }
        .btn-bitwarden { color: var(--neon-blue); border: 1px solid rgba(84, 127, 179, 0.3); background: rgba(84, 127, 179, 0.05); }

        /* Seção de Mapas (Grade 2x2) */
        .maps-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            width: 95%;
            max-width: 1400px;
            margin: 0 auto 50px auto;
        }

        .map-container {
            height: 400px;
            background: rgba(16, 38, 64, 0.9);
            border: 1px solid rgba(84, 127, 179, 0.3);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .map-header {
            background: rgba(0, 0, 0, 0.6); padding: 10px; font-family: 'Share Tech Mono', monospace;
            font-size: 11px; color: var(--neon-blue); border-bottom: 1px solid rgba(84, 127, 179, 0.3);
            display: flex; align-items: center; gap: 8px;
        }

        .map-container iframe { width: 100%; height: calc(100% - 38px); border: none; }

        /* Ajustes Visuais por Mapa */
        .map-checkpoint { filter: invert(0.9) hue-rotate(180deg) brightness(0.8); }
        .map-kaspersky { filter: brightness(0.9); }
        .map-fortinet { filter: brightness(0.9) contrast(1.1); }
        .map-bitdefender { filter: hue-rotate(15deg) brightness(0.9); }

        .footer { font-size: 10px; color: rgba(255,255,255,0.3); padding-bottom: 30px; }
    </style>
</head>
<body>
    <div class="header">
        <img src="{{ url_for('static', filename='coruja.png') }}" class="header-logo">
        <h1>STRIPED OWL SECURITY</h1>
    </div>

    <div class="container">
        <div class="terminal-box">
            <div>> SYSTEM STATUS: ONLINE</div>
            <div>> INTEL_UNIT_ACTIVE...</div>
        </div>

        <form method="POST">
            <div class="input-group">
                <input type="text" name="url" placeholder="DIGITE A URL ALVO..." required>
                <button type="submit" class="btn-verificar">VERIFICAR</button>
            </div>
        </form>

        <a href="https://haveibeenpwned.com/" target="_blank" class="btn-secondary btn-leak">
            <i class="fas fa-user-secret"></i> CONSULTA SENHA VAZADA DARK WEB
        </a>

        <a href="https://bitwarden.com/password-generator/" target="_blank" class="btn-secondary btn-bitwarden">
            <i class="fas fa-key"></i> GERADOR DE SENHAS BITWARDEN
        </a>
    </div>

    <div class="maps-wrapper">
        <div class="map-container">
            <div class="map-header"><i class="fas fa-shield-alt"></i> CHECK POINT THREAT MAP</div>
            <iframe src="https://threatmap.checkpoint.com/" class="map-checkpoint" scrolling="no"></iframe>
        </div>

        <div class="map-container">
            <div class="map-header"><i class="fas fa-virus"></i> KASPERSKY CYBERMAP</div>
            <iframe src="https://cybermap.kaspersky.com/pt/widget/" class="map-kaspersky" scrolling="no"></iframe>
        </div>

        <div class="map-container">
            <div class="map-header"><i class="fas fa-network-wired"></i> FORTIGUARD THREAT MAP</div>
            <iframe src="https://threatmap.fortiguard.com/" class="map-fortinet" scrolling="no"></iframe>
        </div>

        <div class="map-container">
            <div class="map-header"><i class="fas fa-radar"></i> BITDEFENDER LIVE THREATS</div>
            <iframe src="https://threatmap.bitdefender.com/" class="map-bitdefender" scrolling="no"></iframe>
        </div>
    </div>

    <div class="footer">© 2025 Striped Owl Security — Todos os direitos reservados</div>
</body>
</html>
